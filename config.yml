      <h2>Research Thesis & Direction</h2>
      <p class="desc">
        Investigating the structural limitations of Euclidean grid-based CNNs in capturing complex biological morphology. My current methodology leverages **Geometric Deep Learning** to learn representations directly on the graph $G = (V, E)$. 
      </p>
      <div class="method-box">
        <strong>Primary Objective:</strong> Achieving template-invariance in ophthalmic vascular datasets using the **FairFedMed** benchmark.
