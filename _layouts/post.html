---
layout: default
---

<main class="grid-one-column">
  <article class="card main-content" style="padding: 0; overflow: hidden;">

    <!-- Post Header -->
    <div style="
      background: linear-gradient(135deg, rgba(67,206,162,0.18) 0%, rgba(91,155,213,0.12) 100%);
      border-bottom: 1px solid var(--border);
      padding: 40px 52px 36px;
      position: relative; overflow: hidden;
    ">
      <div style="position: absolute; top: -50px; right: -30px; width: 200px; height: 200px; border-radius: 50%; background: rgba(91,155,213,0.06);"></div>

      <!-- Back link -->
      <a href="{{ '/journal.html' | relative_url }}" style="
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 0.82rem; font-weight: 600; color: var(--muted);
        text-decoration: none; margin-bottom: 20px;
        transition: color 0.2s ease;
      "
      onmouseover="this.style.color='var(--accent)';" onmouseout="this.style.color='var(--muted)';">
        ← Back to Technical Journal
      </a>

      <!-- Category tags -->
      {% if page.categories %}
        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;">
          {% for cat in page.categories %}
            <span style="
              font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px;
              text-transform: uppercase; padding: 3px 10px; border-radius: 12px;
              background: rgba(91,155,213,0.12); color: var(--accent);
              border: 1px solid rgba(91,155,213,0.25);
            ">{{ cat }}</span>
          {% endfor %}
        </div>
      {% endif %}

      <!-- Title -->
      <h1 style="margin: 0 0 14px; font-size: 2rem; line-height: 1.3; color: var(--text); max-width: 720px; position: relative;">
        {{ page.title }}
      </h1>

      <!-- Meta -->
      <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap; font-size: 0.82rem; color: var(--muted);">
        <span style="font-family: 'Source Code Pro', monospace;">
          {{ page.date | date: "%B %d, %Y" }}
        </span>
        <span>Aryan Bijva</span>
      </div>
    </div>

    <!-- Post Body -->
    <div class="post-reading-body">
      {{ content }}
    </div>

    <!-- Post Footer -->
    <div style="
      border-top: 1px solid var(--border);
      padding: 24px 52px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    ">
      <a href="{{ '/journal.html' | relative_url }}" style="
        font-size: 0.85rem; font-weight: 600; color: var(--accent);
        text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
      ">← All Journal Entries</a>
      <span style="font-size: 0.8rem; color: var(--muted);">© {{ 'now' | date: "%Y" }} Aryan Bijva</span>
    </div>

  </article>
</main>
